<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="t d">
  <title id="t">Thinking tokens as a budget line</title>
  <desc id="d">One agent turn shown as a horizontal band: a prompt segment, then a wider block of thinking tokens generated adaptively, then the answer segment. The thinking and answer are both billed as output and both consume the same context window. Below, an effort dial runs from low to max, biasing how readily the model spends thinking tokens. To the right, an arrow shows the raw thinking trace being dropped rather than fed into the next turn, and a note marks that the trace is kept out of the cached prefix. Only the answer and a short distilled note carry forward.</desc>

  <style><![CDATA[
    :root{
      --ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;
      --ce-ink-subtle:#9A9A9A;--ce-border:#D9D9D4;
      --ce-primary:#5B7FBF;--ce-accent:#D98E5F;--ce-success:#5C9E78;
      --ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;--ce-neutral-3:#8E8E88;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;
        --ce-ink-subtle:#6E6E68;--ce-border:#2A2D33;
        --ce-primary:#8BA8E0;--ce-accent:#E8B088;--ce-success:#7FBF9B;
        --ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;--ce-neutral-3:#6E6E68;
      }
    }
    .bg{fill:var(--ce-bg);}
    .window{fill:var(--ce-neutral-1);stroke:var(--ce-border);stroke-width:1;}
    .seg{stroke:var(--ce-bg);stroke-width:1.5;}
    .card{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .flow{stroke:var(--ce-ink);stroke-width:1.5;fill:none;}
    .drop{stroke:var(--ce-alert);stroke-width:1.5;fill:none;stroke-dasharray:5 3;}
    .lead{stroke:var(--ce-ink-muted);stroke-width:1;fill:none;}
    .dial{fill:none;stroke:var(--ce-ink-muted);stroke-width:1;}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--ce-ink);}
    .h{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--ce-ink);text-transform:uppercase;letter-spacing:0.06em;}
    .l{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:var(--ce-ink);}
    .s{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:12px;fill:var(--ce-ink-muted);}
    .lab{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:11px;fill:#FFFFFF;}
    .mono{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace;font-size:11px;fill:var(--ce-ink-muted);}
    .monoi{font-family:'JetBrains Mono',ui-monospace,Consolas,monospace;font-size:11px;fill:var(--ce-ink);}
  ]]></style>

  <rect class="bg" width="960" height="360"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="var(--ce-ink)"/>
    </marker>
    <marker id="arrowAlert" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="var(--ce-alert)"/>
    </marker>
  </defs>

  <text class="title" x="48" y="44">Thinking tokens are a budget line</text>
  <text class="s" x="48" y="64">One turn: thinking sits between prompt and answer, is billed as output, and its raw trace is dropped before the next turn.</text>

  <!-- ===== One agent turn: a horizontal window band ===== -->
  <text class="h" x="48" y="104">One agent turn  ·  consumes one context window</text>
  <rect class="window" x="48" y="114" width="620" height="58" rx="6"/>

  <!-- segments inside the band: prompt / thinking (adaptive) / answer -->
  <!-- prompt 150, thinking 300, answer 170 -> 620 total from x=48 -->
  <rect class="seg" x="48"  y="114" width="150" height="58" fill="var(--ce-primary)"/>
  <rect class="seg" x="198" y="114" width="300" height="58" fill="var(--ce-accent)"/>
  <rect class="seg" x="498" y="114" width="170" height="58" fill="var(--ce-success)"/>

  <text class="lab" x="123" y="140" text-anchor="middle">prompt</text>
  <text class="lab" x="123" y="156" text-anchor="middle">input</text>
  <text class="lab" x="348" y="140" text-anchor="middle">thinking tokens</text>
  <text class="lab" x="348" y="156" text-anchor="middle">adaptive</text>
  <text class="lab" x="583" y="140" text-anchor="middle">answer</text>
  <text class="lab" x="583" y="156" text-anchor="middle">returned</text>

  <!-- billing brackets under the band -->
  <line class="lead" x1="48"  y1="180" x2="48"  y2="190"/>
  <line class="lead" x1="198" y1="180" x2="198" y2="190"/>
  <line class="lead" x1="48"  y1="190" x2="198" y2="190"/>
  <text class="s" x="123" y="206" text-anchor="middle">billed as input</text>

  <line class="lead" x1="198" y1="180" x2="198" y2="190"/>
  <line class="lead" x1="668" y1="180" x2="668" y2="190"/>
  <line class="lead" x1="198" y1="190" x2="668" y2="190"/>
  <text class="s" x="433" y="206" text-anchor="middle">both billed as output  ·  thinking is the hidden cost line</text>

  <!-- ===== Effort dial ===== -->
  <text class="h" x="48" y="248">Effort dial  ·  biases how readily the model thinks</text>
  <line class="dial" x1="56" y1="286" x2="470" y2="286"/>
  <!-- ticks -->
  <g class="dial">
    <line x1="72"  y1="280" x2="72"  y2="292"/>
    <line x1="172" y1="280" x2="172" y2="292"/>
    <line x1="272" y1="280" x2="272" y2="292"/>
    <line x1="372" y1="280" x2="372" y2="292"/>
    <line x1="454" y1="280" x2="454" y2="292"/>
  </g>
  <text class="mono" x="72"  y="308" text-anchor="middle">low</text>
  <text class="mono" x="172" y="308" text-anchor="middle">medium</text>
  <text class="mono" x="272" y="308" text-anchor="middle">high</text>
  <text class="mono" x="372" y="308" text-anchor="middle">xhigh</text>
  <text class="mono" x="454" y="308" text-anchor="middle">max</text>
  <!-- growth marker: dot slides toward max -->
  <circle cx="372" cy="286" r="4.5" fill="var(--ce-accent)" stroke="var(--ce-ink)" stroke-width="1"/>
  <line class="flow" x1="56" y1="330" x2="454" y2="330" marker-end="url(#arrow)"/>
  <text class="s" x="56" y="348">more thinking tokens</text>
  <text class="s" x="454" y="348" text-anchor="end">more quality · more cost · more latency</text>

  <!-- ===== Drop the trace / next turn ===== -->
  <!-- flow from answer segment to next turn -->
  <line class="flow" x1="668" y1="143" x2="704" y2="143" marker-end="url(#arrow)"/>

  <!-- carried forward: answer + distilled note -->
  <rect class="card" x="712" y="114" width="200" height="58" rx="6"/>
  <text class="h" x="724" y="134">Next turn</text>
  <text class="s" x="724" y="152">carries: answer + short note</text>
  <text class="mono" x="724" y="166" fill="var(--ce-success)">kept</text>

  <!-- raw trace dropped -->
  <line class="drop" x1="348" y1="172" x2="348" y2="230" marker-end="url(#arrowAlert)"/>
  <rect class="card" x="712" y="200" width="200" height="70" rx="6" stroke="var(--ce-alert)"/>
  <text class="h" x="724" y="220" fill="var(--ce-alert)">Raw trace</text>
  <text class="s" x="724" y="238">dropped, not re-fed</text>
  <text class="s" x="724" y="254">out of cached prefix</text>
  <text class="s" x="724" y="270">out of long-term memory</text>

  <!-- leader from dropped trace point to the raw-trace card -->
  <path class="drop" d="M348,230 C348,250 560,235 712,235" marker-end="url(#arrowAlert)"/>
  <text class="mono" x="500" y="222" text-anchor="middle" fill="var(--ce-alert)">discard</text>

  <!-- cached-prefix note under prompt -->
  <rect class="card" x="712" y="286" width="200" height="44" rx="6"/>
  <text class="s" x="724" y="304">Cached prefix stays stable:</text>
  <text class="monoi" x="724" y="322">system · tools · pinned</text>
</svg>
