<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="t d">
  <title id="t">Context Engineering — Reference Architecture</title>
  <desc id="d">A single-page reference diagram of a production-grade LLM agent. The user interacts with a host application that assembles a context window from six layers: system prompt, tools and MCP servers, memory, retrieved RAG chunks, conversation history, and the user instruction. The host calls the LLM, which may invoke tools, spawn isolated sub-agents, or trigger compression of the context. All inputs and outputs flow through an observability layer (tracing, eval, cost) and a security boundary that filters untrusted content.</desc>

  <style><![CDATA[
    :root{--ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;--ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;--ce-success:#5C9E78;--ce-warn:#B8895A;--ce-alert:#C66B5E;--ce-neutral-1:#EAEAE4;--ce-neutral-2:#CFCFC8;}
    @media (prefers-color-scheme:dark){:root{--ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;--ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;--ce-success:#7FBF9B;--ce-warn:#D4B58A;--ce-alert:#D88880;--ce-neutral-1:#1F2229;--ce-neutral-2:#2C3038;}}
    .bg{fill:var(--ce-bg);}
    .panel{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .panel-dim{fill:var(--ce-neutral-1);stroke:var(--ce-border);stroke-width:1;}
    .panel-sec{fill:var(--ce-surface);stroke:var(--ce-alert);stroke-width:1.25;stroke-dasharray:6 4;}
    .panel-obs{fill:var(--ce-surface);stroke:var(--ce-success);stroke-width:1.25;stroke-dasharray:6 4;}
    .layer{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .pill-p{fill:var(--ce-primary);} .pill-a{fill:var(--ce-accent);}
    .pill-s{fill:var(--ce-success);} .pill-w{fill:var(--ce-warn);} .pill-r{fill:var(--ce-alert);}
    .arrow{stroke:var(--ce-ink-muted);stroke-width:1.25;fill:none;}
    .arrow-p{stroke:var(--ce-primary);stroke-width:1.5;fill:none;}
    .arrow-a{stroke:var(--ce-accent);stroke-width:1.5;fill:none;}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:24px;fill:var(--ce-ink);}
    .head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:14px;fill:#FFFFFF;}
    .head-d{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:13px;fill:var(--ce-ink);}
    .label{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:13px;fill:var(--ce-ink);}
    .small{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--ce-ink-muted);}
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:500;font-size:11px;fill:var(--ce-ink);}
    .axis{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:11px;fill:var(--ce-ink-muted);text-transform:uppercase;letter-spacing:0.08em;}
  ]]></style>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ce-ink-muted)"/>
    </marker>
    <marker id="arP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ce-primary)"/>
    </marker>
    <marker id="arA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ce-accent)"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="40" y="40">Context Engineering — reference architecture</text>
  <text class="small" x="40" y="60">Every concept covered in this series, on one canvas.</text>

  <!-- USER (top-left) -->
  <rect class="panel" x="40" y="96" width="180" height="80" rx="10"/>
  <rect class="pill-p" x="40" y="96" width="80" height="22" rx="11"/>
  <text class="head" x="80" y="113" text-anchor="middle">USER</text>
  <text class="label" x="56" y="146">Human</text>
  <text class="small" x="56" y="164">Sends a turn, reads the reply.</text>

  <!-- HOST APP (top-center) -->
  <rect class="panel" x="260" y="96" width="280" height="80" rx="10"/>
  <rect class="pill-p" x="260" y="96" width="120" height="22" rx="11"/>
  <text class="head" x="320" y="113" text-anchor="middle">HOST APP</text>
  <text class="label" x="276" y="146">Web · CLI · IDE · Email agent</text>
  <text class="small" x="276" y="164">Owns the LLM session, assembles context.</text>

  <!-- LLM (top-right) -->
  <rect class="panel" x="580" y="96" width="200" height="80" rx="10"/>
  <rect class="pill-p" x="580" y="96" width="80" height="22" rx="11"/>
  <text class="head" x="620" y="113" text-anchor="middle">LLM</text>
  <text class="label" x="596" y="146">Claude · GPT · Gemini · …</text>
  <text class="small" x="596" y="164">Stateless.  Sees only what is sent.</text>

  <!-- arrows top row -->
  <path class="arrow-p" d="M220,136 L260,136" marker-end="url(#arP)"/>
  <path class="arrow-p" d="M540,136 L580,136" marker-end="url(#arP)"/>
  <path class="arrow"   d="M780,150 L820,150" marker-end="url(#ar)"/>

  <!-- CONTEXT WINDOW (large center) — vertical stack of 6 layers -->
  <rect class="panel" x="40" y="220" width="500" height="380" rx="12"/>
  <text class="head-d" x="60" y="250">CONTEXT WINDOW  (assembled per turn)</text>

  <!-- 6 layer cards -->
  <g>
    <rect class="layer" x="60" y="266" width="460" height="44" rx="8"/>
    <rect class="pill-p" x="60" y="266" width="6" height="44" rx="3"/>
    <text class="label" x="80" y="286">01 · System prompt</text>
    <text class="small" x="80" y="302">CLAUDE.md / AGENTS.md  ·  identity, rules, format, knowledge, tools</text>

    <rect class="layer" x="60" y="318" width="460" height="44" rx="8"/>
    <rect class="pill-p" x="60" y="318" width="6" height="44" rx="3" opacity="0.7"/>
    <text class="label" x="80" y="338">02 · Tools &amp; MCP descriptions</text>
    <text class="small" x="80" y="354">JSON schemas of every callable function</text>

    <rect class="layer" x="60" y="370" width="460" height="44" rx="8"/>
    <rect class="pill-p" x="60" y="370" width="6" height="44" rx="3" opacity="0.55"/>
    <text class="label" x="80" y="390">03 · Memory &amp; state</text>
    <text class="small" x="80" y="406">Episodic · semantic · procedural recalls</text>

    <rect class="layer" x="60" y="422" width="460" height="44" rx="8"/>
    <rect class="pill-p" x="60" y="422" width="6" height="44" rx="3" opacity="0.55"/>
    <text class="label" x="80" y="442">04 · RAG / retrieved chunks</text>
    <text class="small" x="80" y="458">Top-k after hybrid search + rerank</text>

    <rect class="layer" x="60" y="474" width="460" height="44" rx="8"/>
    <rect class="pill-p" x="60" y="474" width="6" height="44" rx="3" opacity="0.7"/>
    <text class="label" x="80" y="494">05 · Conversation history</text>
    <text class="small" x="80" y="510">Trimmed or compacted as it grows</text>

    <rect class="layer" x="60" y="526" width="460" height="44" rx="8"/>
    <rect class="pill-a" x="60" y="526" width="6" height="44" rx="3"/>
    <text class="label" x="80" y="546">06 · User instruction</text>
    <text class="small" x="80" y="562">Current turn — placed last on purpose</text>
  </g>

  <!-- Right column: WSCI sources/sinks -->
  <!-- WRITE -->
  <rect class="panel" x="580" y="220" width="280" height="84" rx="10"/>
  <rect class="pill-p" x="580" y="220" width="80" height="22" rx="11"/>
  <text class="head" x="620" y="237" text-anchor="middle">WRITE</text>
  <text class="label" x="596" y="270">Filesystem (task.md, plan.md)</text>
  <text class="small" x="596" y="288">Move out, retrieve later.</text>

  <!-- SELECT -->
  <rect class="panel" x="580" y="316" width="280" height="84" rx="10"/>
  <rect class="pill-s" x="580" y="316" width="80" height="22" rx="11"/>
  <text class="head" x="620" y="333" text-anchor="middle">SELECT</text>
  <text class="label" x="596" y="366">Vector DB · BM25 · reranker</text>
  <text class="small" x="596" y="384">Hybrid retrieval feeds layer 04.</text>

  <!-- COMPRESS -->
  <rect class="panel" x="580" y="412" width="280" height="84" rx="10"/>
  <rect class="pill-a" x="580" y="412" width="100" height="22" rx="11"/>
  <text class="head" x="630" y="429" text-anchor="middle">COMPRESS</text>
  <text class="label" x="596" y="462">/compact · LLMLingua</text>
  <text class="small" x="596" y="480">Shrinks layer 05.</text>

  <!-- ISOLATE -->
  <rect class="panel" x="580" y="508" width="280" height="92" rx="10"/>
  <rect class="pill-w" x="580" y="508" width="80" height="22" rx="11"/>
  <text class="head" x="620" y="525" text-anchor="middle">ISOLATE</text>
  <text class="label" x="596" y="558">Sub-agents · parallel workers</text>
  <text class="small" x="596" y="576">Each child has its own window.</text>
  <text class="small" x="596" y="592">Shared files = inter-agent bus.</text>

  <!-- Arrows from WSCI panels into the context window -->
  <path class="arrow"   d="M580,260 L540,288" marker-end="url(#ar)" stroke-dasharray="4 3"/>
  <path class="arrow-a" d="M580,358 L540,440" marker-end="url(#arA)"/>
  <path class="arrow"   d="M580,452 L540,496" marker-end="url(#ar)"/>
  <path class="arrow"   d="M580,550 L540,140" marker-end="url(#ar)" stroke-dasharray="4 3"/>

  <!-- MCP / external (right of LLM) -->
  <rect class="panel" x="880" y="220" width="280" height="180" rx="12"/>
  <text class="head-d" x="900" y="250">MCP SERVERS</text>
  <rect class="layer" x="900" y="262" width="240" height="36" rx="8"/>
  <text class="label" x="916" y="284">Filesystem · GitHub · Jira</text>
  <rect class="layer" x="900" y="306" width="240" height="36" rx="8"/>
  <text class="label" x="916" y="328">Custom internal MCP</text>
  <rect class="layer" x="900" y="350" width="240" height="36" rx="8"/>
  <text class="label" x="916" y="372">Browser / computer-use</text>

  <!-- Arrow LLM <-> MCP -->
  <path class="arrow-p" d="M780,140 L1020,140 L1020,220" marker-end="url(#arP)"/>

  <!-- Sub-agents row (bottom right) -->
  <rect class="panel" x="880" y="416" width="280" height="184" rx="12"/>
  <text class="head-d" x="900" y="446">SUB-AGENTS  (isolated)</text>
  <rect class="layer" x="900" y="458" width="110" height="60" rx="8"/>
  <text class="label" x="955" y="486" text-anchor="middle">Research</text>
  <text class="small" x="955" y="502" text-anchor="middle">own ctx</text>
  <rect class="layer" x="1020" y="458" width="120" height="60" rx="8"/>
  <text class="label" x="1080" y="486" text-anchor="middle">Code</text>
  <text class="small" x="1080" y="502" text-anchor="middle">own ctx</text>
  <rect class="layer" x="900" y="528" width="240" height="60" rx="8"/>
  <text class="label" x="1020" y="556" text-anchor="middle">Eval</text>
  <text class="small" x="1020" y="572" text-anchor="middle">own ctx · separate API call</text>

  <!-- Bottom-spanning bands: Observability and Security -->
  <rect class="panel-obs" x="40" y="630" width="560" height="100" rx="10"/>
  <rect class="pill-s" x="40" y="630" width="160" height="22" rx="11"/>
  <text class="head" x="120" y="647" text-anchor="middle">OBSERVABILITY</text>
  <text class="small" x="56" y="676">Tracing  ·  Token + cost accounting  ·  Replays  ·  Eval suites</text>
  <text class="mono"  x="56" y="700">LangSmith · Langfuse · Phoenix · Helicone · OpenTelemetry GenAI</text>
  <text class="small" x="56" y="720">Wraps every arrow above.  Without it, every change is vibes.</text>

  <rect class="panel-sec" x="620" y="630" width="540" height="100" rx="10"/>
  <rect class="pill-r" x="620" y="630" width="180" height="22" rx="11"/>
  <text class="head" x="710" y="647" text-anchor="middle">SECURITY BOUNDARY</text>
  <text class="small" x="636" y="676">Direct &amp; indirect prompt injection · data exfiltration via tools · MCP risks</text>
  <text class="mono"  x="636" y="700">allow-lists · sandboxes · dual-LLM · output filters · scoped credentials</text>
  <text class="small" x="636" y="720">Any input that reaches the window is executable.  Audit every entry point.</text>

  <!-- Tiny axis labels -->
  <text class="axis" x="290" y="208" text-anchor="middle">assembled per turn</text>
  <text class="axis" x="720" y="208" text-anchor="middle">WSCI primitives</text>
  <text class="axis" x="1020" y="208" text-anchor="middle">external capabilities</text>
</svg>
