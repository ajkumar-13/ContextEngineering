<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460" role="img" aria-labelledby="t d">
  <title id="t">RAG Pipeline</title>
  <desc id="d">A horizontal pipeline showing the seven stages of a retrieval-augmented generation system: ingest documents, chunk them, embed each chunk, store in a vector database, retrieve at query time using hybrid search, rerank the top candidates, and finally augment the LLM prompt with the chosen chunks before generating an answer.</desc>

  <style><![CDATA[
    :root{--ce-bg:#FAFAF7;--ce-surface:#FFFFFF;--ce-ink:#1A1A1A;--ce-ink-muted:#5C5C5C;--ce-ink-subtle:#9A9A9A;--ce-border:#D9D9D4;--ce-primary:#5B7FBF;--ce-accent:#D98E5F;--ce-success:#5C9E78;--ce-neutral-1:#EAEAE4;}
    @media (prefers-color-scheme:dark){:root{--ce-bg:#0E0F12;--ce-surface:#16181C;--ce-ink:#F2F2EE;--ce-ink-muted:#B4B4AE;--ce-ink-subtle:#6E6E68;--ce-border:#2A2D33;--ce-primary:#8BA8E0;--ce-accent:#E8B088;--ce-success:#7FBF9B;--ce-neutral-1:#1F2229;}}
    .bg{fill:var(--ce-bg);}
    .stage{fill:var(--ce-surface);stroke:var(--ce-border);stroke-width:1;}
    .stage-active{fill:var(--ce-surface);stroke:var(--ce-primary);stroke-width:1.5;}
    .pill{fill:var(--ce-primary);}
    .pill-accent{fill:var(--ce-accent);}
    .stroke-ink{stroke:var(--ce-ink);fill:none;stroke-width:1.5;}
    .arrow{stroke:var(--ce-ink-muted);stroke-width:1.5;fill:none;}
    .arrow-accent{stroke:var(--ce-accent);stroke-width:1.75;fill:none;}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--ce-ink);}
    .stage-t{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:13px;fill:var(--ce-ink);}
    .small{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--ce-ink-muted);}
    .lane{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:var(--ce-ink-muted);text-transform:uppercase;letter-spacing:0.06em;}
  ]]></style>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ce-ink-muted)"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ce-accent)"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="460"/>
  <text class="title" x="48" y="44">RAG Pipeline — from raw documents to grounded answer</text>

  <!-- Two lanes -->
  <text class="lane" x="48" y="92">Indexing  (offline, runs once per document)</text>
  <text class="lane" x="48" y="278">Querying  (online, runs on every user turn)</text>

  <!-- Indexing lane: 4 stages -->
  <g>
    <!-- Documents -->
    <rect class="stage" x="48"  y="110" width="160" height="76" rx="10"/>
    <rect class="pill"  x="48"  y="110" width="160" height="6"  rx="3"/>
    <text class="stage-t" x="128" y="142" text-anchor="middle">1 · Documents</text>
    <text class="small"   x="128" y="162" text-anchor="middle">PDFs, wikis, code,</text>
    <text class="small"   x="128" y="176" text-anchor="middle">tickets, transcripts</text>

    <line class="arrow" x1="208" y1="148" x2="240" y2="148" marker-end="url(#ar)"/>

    <!-- Chunk -->
    <rect class="stage" x="240" y="110" width="160" height="76" rx="10"/>
    <rect class="pill"  x="240" y="110" width="160" height="6"  rx="3"/>
    <text class="stage-t" x="320" y="142" text-anchor="middle">2 · Chunk</text>
    <text class="small"   x="320" y="162" text-anchor="middle">recursive · semantic</text>
    <text class="small"   x="320" y="176" text-anchor="middle">parent–child · late</text>

    <line class="arrow" x1="400" y1="148" x2="432" y2="148" marker-end="url(#ar)"/>

    <!-- Embed -->
    <rect class="stage" x="432" y="110" width="160" height="76" rx="10"/>
    <rect class="pill"  x="432" y="110" width="160" height="6"  rx="3"/>
    <text class="stage-t" x="512" y="142" text-anchor="middle">3 · Embed</text>
    <text class="small"   x="512" y="162" text-anchor="middle">+ contextual prefix</text>
    <text class="small"   x="512" y="176" text-anchor="middle">(Anthropic 2024)</text>

    <line class="arrow" x1="592" y1="148" x2="624" y2="148" marker-end="url(#ar)"/>

    <!-- Store -->
    <rect class="stage" x="624" y="110" width="288" height="76" rx="10"/>
    <rect class="pill"  x="624" y="110" width="288" height="6"  rx="3"/>
    <text class="stage-t" x="768" y="142" text-anchor="middle">4 · Store</text>
    <text class="small"   x="768" y="162" text-anchor="middle">vector index  +  BM25 / lexical index</text>
    <text class="small"   x="768" y="176" text-anchor="middle">pgvector · Qdrant · Weaviate · Chroma</text>
  </g>

  <!-- Connector from Store down to Retrieve -->
  <path class="arrow" d="M768,186 L768,210 L320,210 L320,296" marker-end="url(#ar)"/>

  <!-- Querying lane: 4 stages -->
  <g>
    <!-- User query -->
    <rect class="stage-active" x="48"  y="296" width="160" height="92" rx="10"/>
    <rect class="pill-accent"  x="48"  y="296" width="160" height="6"  rx="3"/>
    <text class="stage-t" x="128" y="328" text-anchor="middle">A · User query</text>
    <text class="small"   x="128" y="348" text-anchor="middle">"How do I rotate</text>
    <text class="small"   x="128" y="362" text-anchor="middle">my API keys?"</text>

    <line class="arrow-accent" x1="208" y1="342" x2="240" y2="342" marker-end="url(#ar2)"/>

    <!-- Retrieve -->
    <rect class="stage-active" x="240" y="296" width="160" height="92" rx="10"/>
    <rect class="pill-accent"  x="240" y="296" width="160" height="6"  rx="3"/>
    <text class="stage-t" x="320" y="328" text-anchor="middle">B · Retrieve (top-k)</text>
    <text class="small"   x="320" y="348" text-anchor="middle">hybrid: vector + BM25</text>
    <text class="small"   x="320" y="362" text-anchor="middle">k = 20 candidates</text>

    <line class="arrow-accent" x1="400" y1="342" x2="432" y2="342" marker-end="url(#ar2)"/>

    <!-- Rerank -->
    <rect class="stage-active" x="432" y="296" width="160" height="92" rx="10"/>
    <rect class="pill-accent"  x="432" y="296" width="160" height="6"  rx="3"/>
    <text class="stage-t" x="512" y="328" text-anchor="middle">C · Rerank</text>
    <text class="small"   x="512" y="348" text-anchor="middle">cross-encoder picks</text>
    <text class="small"   x="512" y="362" text-anchor="middle">top 3–5 of the 20</text>

    <line class="arrow-accent" x1="592" y1="342" x2="624" y2="342" marker-end="url(#ar2)"/>

    <!-- Augment + Generate -->
    <rect class="stage-active" x="624" y="296" width="288" height="92" rx="10"/>
    <rect class="pill-accent"  x="624" y="296" width="288" height="6"  rx="3"/>
    <text class="stage-t" x="768" y="328" text-anchor="middle">D · Augment &amp; Generate</text>
    <text class="small"   x="768" y="348" text-anchor="middle">stuff chunks into the RAG layer</text>
    <text class="small"   x="768" y="362" text-anchor="middle">of the LLM context, then call the model</text>
  </g>

  <!-- Footer -->
  <text class="small" x="48" y="430">Vanilla RAG.  Advanced patterns (HyDE, Self-RAG, CRAG, GraphRAG) rewrite or loop the Querying lane — see Post 09.</text>
</svg>
