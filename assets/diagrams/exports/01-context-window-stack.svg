<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" role="img" aria-labelledby="title desc">
  <title id="title">The Six Layers of an LLM's Context Window</title>
  <desc id="desc">A vertical stack showing the six layers an LLM receives in every API call: System Prompt at the top, then Tools and MCP descriptions, Memory and state, RAG and retrieved context, Conversation history, and the User instruction at the bottom. A vertical priority bar on the right shows that the system prompt and the user instruction at the two ends receive the most attention, while the middle layers suffer from the lost-in-the-middle effect.</desc>

  <style><![CDATA[
    :root {
      --ce-bg:#FAFAF7; --ce-surface:#FFFFFF; --ce-ink:#1A1A1A; --ce-ink-muted:#5C5C5C;
      --ce-ink-subtle:#9A9A9A; --ce-border:#D9D9D4;
      --ce-primary:#5B7FBF; --ce-accent:#D98E5F; --ce-success:#5C9E78;
      --ce-warn:#B8895A; --ce-alert:#C66B5E;
      --ce-neutral-1:#EAEAE4; --ce-neutral-2:#CFCFC8; --ce-neutral-3:#8E8E88;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ce-bg:#0E0F12; --ce-surface:#16181C; --ce-ink:#F2F2EE; --ce-ink-muted:#B4B4AE;
        --ce-ink-subtle:#6E6E68; --ce-border:#2A2D33;
        --ce-primary:#8BA8E0; --ce-accent:#E8B088; --ce-success:#7FBF9B;
        --ce-warn:#D4B58A; --ce-alert:#D88880;
        --ce-neutral-1:#1F2229; --ce-neutral-2:#2C3038; --ce-neutral-3:#6E6E68;
      }
    }
    .bg{fill:var(--ce-bg);}
    .card{fill:var(--ce-surface); stroke:var(--ce-border); stroke-width:1;}
    .layer{fill:var(--ce-surface); stroke:var(--ce-border); stroke-width:1;}
    .accent{fill:var(--ce-accent);} .primary{fill:var(--ce-primary);}
    .ink{fill:var(--ce-ink);} .muted{fill:var(--ce-ink-muted);} .subtle{fill:var(--ce-ink-subtle);}
    .stroke-ink{stroke:var(--ce-ink); fill:none; stroke-width:1.5;}
    .stroke-thin{stroke:var(--ce-ink-muted); fill:none; stroke-width:1;}
    .dashed{stroke:var(--ce-ink-muted); fill:none; stroke-width:1; stroke-dasharray:4 3;}
    .title{font-family:Inter,system-ui,sans-serif; font-weight:600; font-size:20px; fill:var(--ce-ink);}
    .label{font-family:Inter,system-ui,sans-serif; font-weight:600; font-size:15px; fill:var(--ce-ink);}
    .small{font-family:Inter,system-ui,sans-serif; font-weight:400; font-size:12px; fill:var(--ce-ink-muted);}
    .num{font-family:'JetBrains Mono',ui-monospace,monospace; font-weight:600; font-size:13px; fill:var(--ce-ink-muted);}
    .priority-bar{fill:url(#priorityGrad);}
  ]]></style>

  <defs>
    <!-- U-curve gradient: dark at top and bottom, faded in the middle -->
    <linearGradient id="priorityGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="var(--ce-primary)" stop-opacity="0.95"/>
      <stop offset="35%"  stop-color="var(--ce-primary)" stop-opacity="0.18"/>
      <stop offset="65%"  stop-color="var(--ce-primary)" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="var(--ce-primary)" stop-opacity="0.95"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ce-ink-muted)"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="620"/>

  <!-- Title -->
  <text class="title" x="48" y="48">The Six Layers of an LLM's Context</text>
  <text class="small" x="48" y="68">Order matters. The top and the bottom of the window get the most attention.</text>

  <!-- Stack panel background -->
  <rect class="card" x="48" y="96" width="640" height="492" rx="12"/>

  <!-- Six layers, top to bottom -->
  <!-- y0=112, layer height=72, gap=8 -->
  <g>
    <!-- Layer 1 -->
    <rect class="layer" x="68" y="112" width="600" height="68" rx="8"/>
    <rect class="primary" x="68" y="112" width="6" height="68" rx="3"/>
    <text class="num"   x="92" y="138">01</text>
    <text class="label" x="120" y="138">System Prompt</text>
    <text class="small" x="120" y="158">Identity · Rules · Format · Knowledge · Tools.  The agent's constitution.</text>

    <!-- Layer 2 -->
    <rect class="layer" x="68" y="188" width="600" height="68" rx="8"/>
    <rect class="primary" x="68" y="188" width="6" height="68" rx="3" opacity="0.7"/>
    <text class="num"   x="92" y="214">02</text>
    <text class="label" x="120" y="214">Tools &amp; MCP descriptions</text>
    <text class="small" x="120" y="234">Function schemas the model may call.  Each tool costs tokens just to be visible.</text>

    <!-- Layer 3 -->
    <rect class="layer" x="68" y="264" width="600" height="68" rx="8"/>
    <rect class="primary" x="68" y="264" width="6" height="68" rx="3" opacity="0.55"/>
    <text class="num"   x="92" y="290">03</text>
    <text class="label" x="120" y="290">Memory &amp; state</text>
    <text class="small" x="120" y="310">Persistent facts retrieved or pinned across calls (preferences, history summaries, scratchpads).</text>

    <!-- Layer 4 -->
    <rect class="layer" x="68" y="340" width="600" height="68" rx="8"/>
    <rect class="primary" x="68" y="340" width="6" height="68" rx="3" opacity="0.55"/>
    <text class="num"   x="92" y="366">04</text>
    <text class="label" x="120" y="366">RAG &amp; retrieved context</text>
    <text class="small" x="120" y="386">Chunks fetched from a knowledge base for this specific query.</text>

    <!-- Layer 5 -->
    <rect class="layer" x="68" y="416" width="600" height="68" rx="8"/>
    <rect class="primary" x="68" y="416" width="6" height="68" rx="3" opacity="0.7"/>
    <text class="num"   x="92" y="442">05</text>
    <text class="label" x="120" y="442">Conversation history</text>
    <text class="small" x="120" y="462">Prior user/assistant turns of the current session.  Trimmed or compacted as it grows.</text>

    <!-- Layer 6 -->
    <rect class="layer" x="68" y="492" width="600" height="68" rx="8"/>
    <rect class="accent" x="68" y="492" width="6" height="68" rx="3"/>
    <text class="num"   x="92" y="518">06</text>
    <text class="label" x="120" y="518">User instruction</text>
    <text class="small" x="120" y="538">The current turn's request.  Deliberately placed last so the model attends to it sharply.</text>
  </g>

  <!-- Priority / attention bar on the right -->
  <g transform="translate(720, 96)">
    <rect class="card" x="0" y="0" width="192" height="492" rx="12"/>
    <text class="label" x="96" y="28" text-anchor="middle">Effective attention</text>
    <text class="small" x="96" y="46" text-anchor="middle">across the window</text>

    <!-- The U-curve bar -->
    <rect class="priority-bar" x="42" y="64" width="44" height="392" rx="22"/>

    <!-- Top axis label -->
    <text class="small" x="100" y="78"  >high</text>
    <text class="small" x="100" y="270" >low (lost-in-the-middle)</text>
    <text class="small" x="100" y="452" >high</text>

    <!-- Tick marks aligned to layers -->
    <g stroke="var(--ce-ink-subtle)" stroke-width="0.75">
      <line x1="86" y1="84"  x2="96" y2="84"/>
      <line x1="86" y1="160" x2="96" y2="160"/>
      <line x1="86" y1="236" x2="96" y2="236"/>
      <line x1="86" y1="312" x2="96" y2="312"/>
      <line x1="86" y1="388" x2="96" y2="388"/>
      <line x1="86" y1="464" x2="96" y2="464"/>
    </g>

    <!-- Footer note -->
    <text class="small" x="96" y="486" text-anchor="middle">Liu et al., 2023</text>
  </g>

  <!-- Bottom legend: input order -->
  <g transform="translate(48, 596)">
    <text class="small" x="0" y="0">Sent to the model in the order shown above — top first, user instruction last.</text>
  </g>
</svg>
